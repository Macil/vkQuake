name: Windows arm64 CI (mingw)

on: [push, pull_request]

jobs:
  build-mingw:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}

    defaults:
      run:
        shell: ${{ matrix.platform.shell }}

    strategy:
      fail-fast: false
      matrix:
        platform:
        - { name: Windows (clangarm64),  os: windows-11-arm, shell: 'msys2 {0}', msystem: clangarm64, msys-env: mingw-w64-clang-aarch64, makefile: Makefile.w64a, rust-target: aarch64-pc-windows-gnullvm }

    steps:
    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: ${{ matrix.platform.msystem }}
        path-type: inherit
        install: base-devel
          ${{ matrix.platform.msys-env }}-gcc-compat
          ${{ matrix.platform.msys-env }}-glslang
          ${{ matrix.platform.msys-env }}-vulkan-headers
          ${{ matrix.platform.msys-env }}-opus
          ${{ matrix.platform.msys-env }}-opusfile
          ${{ matrix.platform.msys-env }}-mpg123
          ${{ matrix.platform.msys-env }}-SDL2
          ${{ matrix.platform.msys-env }}-flac
          ${{ matrix.platform.msys-env }}-libmad
          ${{ matrix.platform.msys-env }}-libogg
          ${{ matrix.platform.msys-env }}-libvorbis
          ${{ matrix.platform.msys-env }}-libxmp

    - uses: actions/checkout@v4

    - name: Set up cargo cache
      uses: actions/cache@v3
      continue-on-error: false
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          rust/target/
        key: ${{ runner.os }}-${{ matrix.platform.msystem }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.platform.msystem }}-cargo-
    - name: Add Rust target
      run: rustup target add ${{ matrix.platform.rust-target }}

    - name: Build MinGW
      run: |
        set -eu
        parallel="$(getconf _NPROCESSORS_ONLN)"
        make -j"${parallel}" -C Quake -f ${{ matrix.platform.makefile }} all
    - name: Upload vkQuake
      uses: actions/upload-artifact@v4
      with:
        name: vkQuake archive (${{ matrix.platform.msystem }})
        path: |
            Quake/*.exe
            Quake/*.dll
