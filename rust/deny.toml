[advisories]
# relying on cargo audit in CI for advisories instead
unmaintained = "workspace"
ignore = []

[licenses]
allow = [
    "MIT",
    "ISC",
    "BSD-3-Clause",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSL-1.0",
    "Unicode-3.0",
]
exceptions = []

[bans]
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
